# .github/workflows/update-data.yml
# Refreshes data.json every weekday after US close, commits, and republishes GitHub Pages.
name: Update Turnaround Monitor Data

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC ≈ after US market close, Mon–Fri
  workflow_dispatch:           # manual trigger button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Refresh data.json
        run: python scripts/update_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: daily data refresh $(date -u +%F)"
          git push
